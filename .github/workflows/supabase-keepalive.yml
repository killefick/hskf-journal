name: Supabase keep-alive

# Free-tier Supabase pauses projects without "sufficient user database activity
# over the past week" — their docs say "a few user requests each day". One ping
# per day proved too little: Supabase sent an inactivity warning 2026-07-20
# despite six consecutive green daily runs, so we ping four times a day now.
# The anon key is the same publishable key committed in index.html (safe with RLS).
on:
  schedule:
    - cron: "17 3,9,15,21 * * *" # 4x daily (off-the-hour to dodge GitHub cron congestion)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase REST API
        run: |
          curl -fsS --retry 3 --retry-delay 30 \
            -H "apikey: sb_publishable_r66dpwZMS57w5DBGtd_rIw_Rm_0o2-1" \
            "https://jjxvgmobigoyzbssknxp.supabase.co/rest/v1/skjuttillfallen?select=id&limit=1" \
            -o /dev/null -w "HTTP %{http_code}\n"
